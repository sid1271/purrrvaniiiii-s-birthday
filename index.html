<div id="screen1-5" class="screen">
    <div class="cake-container">
        <div id="cake-display" class="cake">
            <div class="candles" id="candles-group">
                <div class="candle"></div><div class="candle"></div><div class="candle"></div><div class="candle"></div><div class="candle"></div>
                <div class="candle"></div><div class="candle"></div><div class="candle"></div><div class="candle"></div><div class="candle"></div>
                <div class="candle"></div><div class="candle"></div><div class="candle"></div><div class="candle"></div><div class="candle"></div>
                <div class="candle"></div><div class="candle"></div><div class="candle"></div><div class="candle"></div>
            </div>
            <div class="cake-body"></div>
        </div>

        <button id="blow-button" class="next-btn" onclick="blowCandles()">Blow out the candles! 🎂</button>
        
        <div id="knife" class="hidden" draggable="true" ondragstart="drag(event)">🔪</div>
        
        <div id="cake-slice" class="hidden" draggable="true" ondragstart="drag(event)">🍰</div>

        <div id="avatar-container" class="hidden">
            <div class="avatar-wrapper">
                <img src="assets/siddhant.png" id="siddhant-avatar" class="avatar" ondrop="drop(event, 'siddhant')" ondragover="allowDrop(event)">
                <div id="bubble-siddhant" class="speech-bubble hidden">Yummm! Now you have some too! 😋</div>
            </div>
            <div class="avatar-wrapper">
                <img src="assets/parvani.png" id="parvani-avatar" class="avatar" ondrop="drop(event, 'parvani')" ondragover="allowDrop(event)">
                <div id="bubble-parvani" class="speech-bubble hidden">Happy Birthday to me! ❤️</div>
            </div>
        </div>

        <button id="to-letters-btn" class="next-btn hidden" onclick="goToScreen2()">Move to Letters ✨</button>
    </div>
</div>
