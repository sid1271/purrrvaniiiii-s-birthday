<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Parvani ❤️</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="screen1" class="screen active">
        <div class="heart-trigger" onclick="goToScreen2()">❤️</div>
    </div>

    <div id="screen2" class="screen">
        <h1 class="fade-in-text">Happy Birthday, Parvaniiiiii</h1>
        <div class="cat-decoration">🐱✨</div>
        <button class="next-btn" onclick="goToScreen3()">Open your letters</button>
    </div>

    <div id="screen3" class="screen">
        <div id="letter-container" class="letter-wall"></div>
        <button id="quiz-trigger" class="next-btn hidden" onclick="goToScreen4()">Now, a quick quiz!</button>
    </div>

    <div id="screen4" class="screen">
        <form id="birthday-form">
            <div id="form-content"></div>
            <button type="button" class="submit-btn" onclick="submitForm()">Finish ❤️</button>
        </form>
    </div>

  <div id="screen5" class="screen">
    <div class="night-sky">
        <div class="moon-visual-layer">
            <div id="moon-message">Scroll to see the moon grow...</div>
            <div class="moon-wrapper">
                <img src="assets/moon.png" class="glowing-moon">
                <div class="moon-shadow"></div> 
            </div>
            <div id="final-center-text" class="hidden">
                <h1>Forever My Full Moon.</h1>
                <p>I Love You, Parvani.</p>
            </div>
        </div>

        <div id="moon-scroll-trigger">
            <div style="height: 300vh;"></div> </div>
        
        <div id="star-field"></div>
    </div>
</div>

    <div id="letter-modal" class="modal hidden" onclick="closeLetter()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-modal" onclick="closeLetter()">&times;</span>
            <div id="modal-text"></div>
        </div>
    </div>

    <form id="formspree-form" action="https://formspree.io/f/mnjgywkz" method="POST" style="display:none;">
        <input type="hidden" name="responses" id="hidden-responses">
    </form>

    <script src="script.js"></script>
</body>
</html>
